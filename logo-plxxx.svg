  <!-- Línea horizontal roja -->
  <rect x="55" y="295" width="290" height="8" rx="4" fill="#ff0000"/>
  
  <!-- Chevron hacia abajo -->
  <polyline points="175,303 200,328 225,303" fill="none" stroke="#ff0000" stroke-width="8" stroke-linejoin="round"/>

  <!-- Espacios entre segmentos -->
